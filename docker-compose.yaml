version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bank_postgres
    environment:
      POSTGRES_DB: bank_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bank_network

  redis:
    image: redis:7-alpine
    container_name: bank_redis
    ports:
      - "6379:6379"
    networks:
      - bank_network
    volumes:
      - redis_data:/data 

  pgadmin:
    image: dpage/pgadmin4
    container_name: bank_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - postgres
    networks:
      - bank_network

  api:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: bank_api
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=postgres  
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=root
      - DB_NAME=bank_app
      - REDIS_HOST=redis
      - REDIS_PORT=6379

    depends_on:
      - postgres
      - redis
    networks:
      - bank_network

volumes:
  postgres_data:
  redis_data:

networks:
  bank_network:
    driver: bridge
